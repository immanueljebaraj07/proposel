<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grocery Proposal Generator</title>
</head>
<body>
    <h1>Grocery Proposal Generator</h1>

    <h2>Login</h2>
    <form action="#" method="post">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
        <button type="submit">Login</button>
    </form>

    <h2>Register</h2>
    <form action="#" method="post">
        <label for="new-email">Email:</label>
        <input type="email" id="new-email" name="new-email" required>
        <button type="submit">Register</button>
    </form>

    <h2>Grocery Proposal Generator</h2>
    <form action="#" method="post">
        <label for="buyer-email">Buyer Email for Notifications:</label>
        <input type="email" id="buyer-email" name="buyer-email" required>
        <button type="submit">Generate Proposal</button>
    </form>
</body>
</html>
